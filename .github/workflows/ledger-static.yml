name: Public Ledger Static Gate

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ledger-static-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ledger-static:
    runs-on: ubuntu-latest
    steps:
      # pull_request_target is intentional: every command comes from the
      # protected base SHA. The candidate checkout is parsed only as data.
      - name: Check out trusted base control code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: control
          persist-credentials: false
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Check out candidate as untrusted data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false
          fetch-depth: 1
          submodules: false
          lfs: false

      - name: Set up pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install hash-locked verifier dependency
        run: python -m pip install --disable-pip-version-check --require-hashes -r control/governance/requirements-ci-linux.lock

      - name: Test trusted base validator
        working-directory: control
        run: python -m unittest discover -s tests -v

      - name: Parse candidate with trusted base validator
        run: python control/governance/validate_pr.py --base control --candidate candidate
